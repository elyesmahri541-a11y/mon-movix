<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Site Vidéo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #0f172a;
      color: #ffffff;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin-bottom: 24px;
    }
    .video-card {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16 / 9;
      margin-bottom: 30px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

  <h1>Mes Lecteurs Vidéo</h1>

  <!-- Premier lecteur -->
  <div class="video-card">
    <iframe src="https://www.2embed.cc/embed/1083381" allowfullscreen></iframe>
  </div>

  <!-- Pour ajouter un deuxième lecteur, duplique le bloc ci-dessous : -->

  <div class="video-card">
    <iframe src="TON_AUTRE_LIEN_EMBED" allowfullscreen></iframe>
  </div>
  -->

</body>
</html>
